<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semantic Energy Chat</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="background-mesh"></div>

    <div class="app-container">
        <header class="app-header">
            <h1>Semantic Energy</h1>
            <p>Powered by Qwen 2.5 & Confidence Logits</p>
        </header>

        <main class="chat-container" id="chat-container">
            <!-- Messages will be injected here -->
            <div class="message system-message">
                <div class="message-bubble">
                    Hello! Ask me anything. I calculate my hallucination risk in real-time.
                </div>
            </div>
        </main>

        <div class="input-area">
            <div class="input-wrapper">
                <textarea id="prompt-input" rows="1" placeholder="Message..." spellcheck="false"></textarea>
                <button id="send-button" aria-label="Send Message">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                </button>
            </div>
            <div class="processing-status" id="status-text">Ready</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
